name: Build and push to Yandex Container Registry

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to the registry (set to false for local act runs)"
        required: false
        default: "true"

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

env:
  YCR_REGISTRY_ID: ${{ secrets.YCR_REGISTRY_ID }}
  YCR_HOST: cr.yandex

jobs:
  build:
    name: Build & push ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: rubert-api
            context: .
            dockerfile: Dockerfile.gpu
          - name: rubert-frontend
            context: ./frontend
            dockerfile: frontend/Dockerfile_prod
          - name: rubert-nginx
            context: ./nginx
            dockerfile: nginx/Dockerfile_prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: meta
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          REF_NAME="${GITHUB_REF_NAME//\//-}"
          REGISTRY_PATH="${YCR_HOST}/${YCR_REGISTRY_ID}/${{ matrix.image.name }}"

          TAGS="${REGISTRY_PATH}:${SHORT_SHA}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAGS="${TAGS},${REGISTRY_PATH}:${GITHUB_REF_NAME}"
            TAGS="${TAGS},${REGISTRY_PATH}:latest"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            TAGS="${TAGS},${REGISTRY_PATH}:latest"
            TAGS="${TAGS},${REGISTRY_PATH}:main"
          else
            TAGS="${TAGS},${REGISTRY_PATH}:${REF_NAME}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "registry_path=${REGISTRY_PATH}" >> "$GITHUB_OUTPUT"
          echo "Resolved tags: ${TAGS}"

      - name: Determine if push is required
        id: gate
        run: |
          set -euo pipefail
          PUSH="true"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            PUSH="${{ github.event.inputs.push_images || 'true' }}"
          fi
          echo "push=${PUSH}" >> "$GITHUB_OUTPUT"
          echo "Will push: ${PUSH}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Obtain IAM token from service account key
        if: steps.gate.outputs.push == 'true'
        id: yc_iam
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build${{ steps.gate.outputs.push == 'true' && ' and push' || '' }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: ${{ steps.gate.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
          provenance: false
