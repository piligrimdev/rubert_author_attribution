server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: api-local-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: api
          __path__: /var/log/app/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
            service: service
            request_id: request_id
            logger: logger
      - labels:
          level:
          service:
          event:
