[tool.poetry]
name = "rubert-api"
version = "0.1.0"
description = "FastAPI app for author attribution"
authors = []

[tool.poetry.dependencies]
python = ">=3.13,<3.15"
torch = {version = ">=2.11.0,<3.0.0", source = "pytorch-cpu"}
fastapi = ">=0.135.3,<0.136.0"
uvicorn = ">=0.44.0,<0.45.0"
pydantic = ">=2.12.5,<3.0.0"
sqlalchemy = ">=2.0.49,<3.0.0"
alembic = ">=1.18.4,<2.0.0"
sqlalchemy-utils = ">=0.42.1,<0.43.0"
pgvector = ">=0.4.2,<0.5.0"
psycopg-binary = ">=3.3.3,<4.0.0"
psycopg2-binary = ">=2.9.12,<3.0.0"
sqladmin = ">=0.25.0,<0.26.0"
itsdangerous = ">=2.2.0,<3.0.0"
pyjwt = ">=2.12.1,<3.0.0"
transformers = ">=5.5.3,<6.0.0"
peft = ">=0.19.1,<0.20.0"
numpy = ">=2.4.4,<3.0.0"
scipy = ">=1.17.1,<2.0.0"
pandas = ">=3.0.2,<4.0.0"
nltk = ">=3.9.4,<4.0.0"
fasttext-numpy2 = ">=0.10.4,<0.11.0"
razdel = ">=0.5.0,<0.6.0"
spacy = ">=3.8.14,<4.0.0"
textstat = ">=0.7.13,<0.8.0"
lexicalrichness = ">=0.5.1,<0.6.0"
mlflow-skinny = ">=3.12.0,<4.0.0"
dotenv = ">=0.9.9,<0.10.0"
boto3 = ">=1.35.0,<2.0.0"
celery = ">=5.6.3,<6.0.0"
redis = ">=7.4.0,<8.0.0"
flower = ">=2.0.1,<3.0.0"
prometheus-client = ">=0.21.0,<0.23.0"
prometheus-fastapi-instrumentator = ">=7.0.0,<8.0.0"
structlog = ">=24.4.0,<26.0.0"

[[tool.poetry.source]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
priority = "explicit"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
