services:
  mlflow-db:
    image: postgres:16-alpine
    container_name: mlflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MLFLOW_DB_USER:-mlflow}
      POSTGRES_PASSWORD: ${MLFLOW_DB_PASSWORD:-mlflow}
      POSTGRES_DB: ${MLFLOW_DB_NAME:-mlflow}
    volumes:
      - mlflow_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MLFLOW_DB_USER:-mlflow}"]
      interval: 5s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    hostname: mlflow
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mlflow-db:
        condition: service_healthy
    volumes:
      - ./mlartifacts:/mlartifacts
    command: >
      bash -c "pip install --quiet psycopg2-binary boto3 &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --allowed-hosts '*'
      --backend-store-uri postgresql+psycopg2://${MLFLOW_DB_USER:-mlflow}:${MLFLOW_DB_PASSWORD:-mlflow}@mlflow-db:5432/${MLFLOW_DB_NAME:-mlflow}
      --artifacts-destination s3://${MLFLOW_BUCKET}/mlflow-artifacts
      --serve-artifacts"
    ports:
      - "2000:5000"

  db:
    hostname: postgres
    image: pgvector/pgvector:pg17
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1s
      timeout: 5s
      retries: 10
    expose:
      - 5432
    volumes:
      - dbdata:/var/lib/postgresql/data
    user: postgres

  cache:
    hostname: rediscache
    image: redis
    restart: always
    expose:
      - 6379
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
    volumes:
      - cache_data:/data

  web:
    build:
      dockerfile: ./Dockerfile
    hostname: web
    env_file:
      - .env
    environment:
      - REDIS_ADDR=rediscache
      - PGSQL_HOST=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_NAME=postgres
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CELERY_BROKER_URL=redis://rediscache:6379
      - CELERY_RESULT_BACKEND=redis://rediscache:6379
      - CORPUS_UPLOAD_STORAGE=local
      - CORPUS_IMPORT_DIR=/var/tmp/corpus_uploads
      - USE_BERT=1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - LOG_JSON=1
      - METRICS_ENABLED=1
      - LOG_DIR=/var/log/app
      - SERVICE_NAME=api
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/api_bd
    expose:
      - 8000
    command: >
      sh -c "python run.py"
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started

    volumes:
      - corpus_uploads:/var/tmp/corpus_uploads
      - ./logs:/var/log/app

  worker:
    build:
      dockerfile: ./Dockerfile

    env_file:
      - .env
    environment:
      - REDIS_ADDR=rediscache
      - PGSQL_HOST=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_NAME=postgres
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CELERY_BROKER_URL=redis://rediscache:6379
      - CELERY_RESULT_BACKEND=redis://rediscache:6379
      - CORPUS_UPLOAD_STORAGE=local
      - CORPUS_IMPORT_DIR=/var/tmp/corpus_uploads
      - LOG_DIR=/var/log/app
      - SERVICE_NAME=celery
      - LOG_JSON=1
      - METRICS_ENABLED=1
      - CELERY_METRICS_PORT=8001

    command: >
      sh -c "celery -A app.core.workers.celery worker --loglevel=info --pool solo"    

    volumes:
      - corpus_uploads:/var/tmp/corpus_uploads
      - ./logs:/var/log/app

    expose:
      - 8001

    depends_on:
      cache:
        condition: service_healthy
      db:
        condition: service_healthy

  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.4.2
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/app:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    env_file:
      - .env
    environment:
      #LOCAL_API_METRICS_TARGET: ${LOCAL_API_METRICS_TARGET:-host.docker.internal:3000}
      LOCAL_API_METRICS_TARGET: web:8000

    volumes:
      - ./observability/prometheus.yml.template:/etc/prometheus/prometheus.yml.template:ro
      - prometheus_data:/prometheus
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed "s|__API_METRICS_TARGET__|$$LOCAL_API_METRICS_TARGET|g" \
          /etc/prometheus/prometheus.yml.template > /tmp/prometheus.yml
        exec prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --web.enable-lifecycle

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - prometheus

  frontend:
    build: ./frontend
    container_name: frontend
    command: npm run dev -- --host
    expose:
      - 3000
    env_file:
      - ./.env
    environment:
      - API_PROXY_TARGET=http://web:8000
    tty: true
    volumes:
      - /srv/app/node_modules

  nginx:
    build: ./nginx
    ports:
      - 80:80
    depends_on:
      - web
      - frontend
      - db

volumes:
  mlflow_db_data:
  cache_data:
  dbdata:
  corpus_uploads:
  loki_data:
  prometheus_data:
  grafana_data:
